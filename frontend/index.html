<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PagePair Reader</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">PP</div>
          <div>
            <h1>PagePair Reader</h1>
            <p id="documentTitle">课程 PDF 逐页讲解</p>
          </div>
        </div>

        <div class="topbar-actions">
          <button class="icon-button" id="oauthButton" type="button" title="连接 OpenAI OAuth" aria-label="连接 OpenAI OAuth">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 11V8a5 5 0 0 1 10 0v3" />
              <rect x="5" y="11" width="14" height="10" rx="2" />
            </svg>
          </button>
          <label class="icon-button" title="上传 PDF" aria-label="上传 PDF">
            <input id="pdfInput" type="file" accept="application/pdf" />
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12" />
              <path d="m7 8 5-5 5 5" />
              <path d="M5 21h14" />
            </svg>
          </label>
          <label class="icon-button" title="导入 PagePair JSON" aria-label="导入 PagePair JSON">
            <input id="jsonInput" type="file" accept="application/json,.json" />
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 3v4a2 2 0 0 0 2 2h4" />
              <path d="M20 13v5a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3h7l6 6" />
              <path d="M8 15h8" />
              <path d="M8 18h5" />
            </svg>
          </label>
          <button class="icon-button" id="exportButton" type="button" title="导出 JSON" aria-label="导出 JSON">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21V9" />
              <path d="m7 16 5 5 5-5" />
              <path d="M5 3h14" />
            </svg>
          </button>
          <button class="primary-button" id="generateButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z" />
            </svg>
            生成
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="page-rail" aria-label="页面列表">
          <div class="rail-tools">
            <div class="search-box">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7" />
                <path d="m16 16 4 4" />
              </svg>
              <input id="searchInput" type="search" placeholder="搜索页标题" />
            </div>
            <div class="rail-meta">
              <span id="pageCount">0 页</span>
              <span id="readyCount">0 ready</span>
            </div>
          </div>
          <div id="pageList" class="page-list"></div>
        </aside>

        <section class="pdf-pane" aria-label="原 PDF">
          <div class="pane-toolbar">
            <div class="toolbar-title">
              <span class="status-dot"></span>
              <span id="pdfStatus">示例预览</span>
            </div>
            <div class="toolbar-actions">
              <button class="mini-button" id="prevButton" type="button" title="上一页" aria-label="上一页">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m15 18-6-6 6-6" />
                </svg>
              </button>
              <output id="pageOutput">1 / 1</output>
              <button class="mini-button" id="nextButton" type="button" title="下一页" aria-label="下一页">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m9 18 6-6-6-6" />
                </svg>
              </button>
            </div>
          </div>

          <div class="pdf-frame" id="pdfFrame">
            <iframe id="pdfViewer" title="PDF 预览"></iframe>
            <article class="slide-preview" id="slidePreview"></article>
          </div>
        </section>

        <section class="notes-pane" aria-label="讲解">
          <div class="pane-toolbar">
            <div class="toolbar-title">
              <span id="confidenceBadge" class="confidence-badge">0%</span>
              <span id="noteTitle">讲解</span>
            </div>
            <div class="tab-group" role="tablist" aria-label="内容视图">
              <button class="tab-button active" data-tab="notes" type="button">讲解</button>
              <button class="tab-button" data-tab="structure" type="button">结构</button>
              <button class="tab-button" data-tab="json" type="button">JSON</button>
            </div>
          </div>

          <div class="notes-content">
            <div class="tab-panel active" id="notesPanel"></div>
            <div class="tab-panel" id="structurePanel"></div>
            <pre class="tab-panel json-panel" id="jsonPanel"></pre>
          </div>
        </section>
      </main>

      <footer class="statusbar">
        <span id="authStatus">OpenAI Gateway: 未连接</span>
        <span id="jobStatus">本地原型</span>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
